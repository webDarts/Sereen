<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #f2f0ea; font-family: "Poppins", sans-serif;
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 90px; position: relative;
  }
  .word { position: relative; font-weight: 800; font-size: 132px; letter-spacing: -4px; color: #0d3fc2; line-height: 1; height: 320px; display: flex; align-items: center; }
  .word span { position: absolute; left: 0; white-space: nowrap; }
  .kicker { font-size: 24px; font-weight: 600; letter-spacing: 8px; text-transform: uppercase; color: #55575f; }
  .focus { font-size: 26px; font-weight: 600; color: #1c1e24; margin-top: 8px; }
</style>
</head>
<body>
  <p class="kicker">Portfolio — Design &amp; Visual Communication</p>
  <div class="word">
    <span style="transform: translateY(-160px); opacity: .13;">sereen madi</span>
    <span style="transform: translateY(-107px); opacity: .22;">sereen madi</span>
    <span style="transform: translateY(-54px); opacity: .36;">sereen madi</span>
    <span style="transform: translateY(54px); opacity: .36;">sereen madi</span>
    <span style="transform: translateY(107px); opacity: .22;">sereen madi</span>
    <span style="transform: translateY(160px); opacity: .13;">sereen madi</span>
    <span>sereen madi</span>
  </div>
  <p class="focus">Graphic Design · Arabic Typography · Packaging · Illustration</p>
</body>
</html>
